workflows:
  android-app:
    name: InDriver Bot
    max_build_duration: 30
    environment:
      java: 17
    cache:
      disabled: true
    scripts:
      - name: Clean and Build APK
        script: |
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - app/build/outputs/apk/debug/*.apk
